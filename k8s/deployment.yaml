apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-backend
  labels:
    app: inference-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-backend
  template:
    metadata:
      labels:
        app: inference-backend
    spec:
      containers:
      - name: backend
        image: your-registry/inference-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://postgres:postgres@postgres-service:5432/postgres"
        - name: REDIS_URL
          value: "redis://redis-service:6379/0"
---
apiVersion: v1
kind: Service
metadata:
  name: inference-backend-service
spec:
  selector:
    app: inference-backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
